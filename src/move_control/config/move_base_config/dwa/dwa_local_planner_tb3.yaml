DWAPlannerROS:
  # --- Diff-drive constraint ---
  holonomic_robot: false

  # --- Velocity limits (TB3-like, conservative) ---
  max_vel_x: 0.25
  min_vel_x: 0.00
  max_vel_y: 0.00
  min_vel_y: 0.00

  max_vel_trans: 0.25
  min_vel_trans: 0.00
  trans_stopped_vel: 0.05

  max_vel_theta: 1.2
  min_vel_theta: 0.2
  theta_stopped_vel: 0.05

  # --- Acceleration limits ---
  acc_lim_x: 0.8
  acc_lim_y: 0.0
  acc_lim_trans: 0.8
  acc_lim_theta: 2.5

  # --- Goal tolerance ---
  xy_goal_tolerance: 0.10
  yaw_goal_tolerance: 0.15
  latch_xy_goal_tolerance: true

  # --- Forward simulation ---
  sim_time: 1.5
  vx_samples: 12
  vy_samples: 1
  vtheta_samples: 30

  # --- Trajectory scoring ---
  path_distance_bias: 32.0
  goal_distance_bias: 20.0
  occdist_scale: 0.08
  forward_point_distance: 0.325
  stop_time_buffer: 0.2
  scaling_speed: 0.25
  max_scaling_factor: 0.2

  # --- Oscillation ---
  oscillation_reset_dist: 0.2

  # --- Debug ---
  publish_traj_pc: true
  publish_cost_grid_pc: true
  global_frame_id: odom

