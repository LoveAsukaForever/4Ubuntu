#!/usr/bin/env python
PACKAGE = "my_planner"

from dynamic_reconfigure.parameter_generator_catkin import *

gen = ParameterGenerator()

# 最大速度限制
gen.add("max_linear_vel_x",    double_t, 0, "Maximum linear velocity in x direction (forward)",  0.5,  0.0,  2.0)
gen.add("max_linear_vel_y",    double_t, 0, "Maximum linear velocity in y direction (lateral)",   0.5,  0.0,  2.0)
gen.add("max_angular_vel_z",   double_t, 0, "Maximum angular velocity around z axis",            0.5,  0.0,  3.14)

# PID 参数 - linear_x (前进方向)
gen.add("linear_x_pid_p",      double_t, 0, "Proportional gain for linear_x PID",  3.0,  0.0,  10.0)
gen.add("linear_x_pid_i",      double_t, 0, "Integral gain for linear_x PID",      0.0,  0.0,   5.0)
gen.add("linear_x_pid_d",      double_t, 0, "Derivative gain for linear_x PID",    0.5,  0.0,   5.0)

# PID 参数 - linear_y (横向)
gen.add("linear_y_pid_p",      double_t, 0, "Proportional gain for linear_y PID",  3.0,  0.0,  10.0)
gen.add("linear_y_pid_i",      double_t, 0, "Integral gain for linear_y PID",      0.0,  0.0,   5.0)
gen.add("linear_y_pid_d",      double_t, 0, "Derivative gain for linear_y PID",    0.5,  0.0,   5.0)

# PID 参数 - angular_z (偏航)
gen.add("angular_z_pid_p",     double_t, 0, "Proportional gain for angular_z PID", 2.0,  0.0,  10.0)
gen.add("angular_z_pid_i",     double_t, 0, "Integral gain for angular_z PID",     0.0,  0.0,   5.0)
gen.add("angular_z_pid_d",     double_t, 0, "Derivative gain for angular_z PID",   0.5,  0.0,   5.0)

# 其他重要阈值和参数
gen.add("goal_reached_threshold",  int_t,    0, "Maximum remaining path points to consider goal reached",  5,  1,  20)
gen.add("yaw_threshold",           double_t, 0, "Maximum yaw error (radians) to consider goal reached",    0.15, 0.0,  1.0)
gen.add("forward_path_num",        int_t,    0, "Number of lookahead path points for planning",          10,   5,  50)

# 坐标系名称（通常不建议动态改，但可以暴露）
gen.add("robot_frame",  str_t, 0, "Robot base frame name",  "/base_link")
gen.add("odom_frame",   str_t, 0, "Odometry frame name",    "/odom")

# 生成配置文件
exit(gen.generate(PACKAGE, "my_planner", "MyPlanner"))